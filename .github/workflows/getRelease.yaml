name: Daily Formula Update

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Check and update formulas
        run: bash getRelease.sh

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update formula to latest release"
          file_pattern: "Formula/*.rb"
